<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="neonGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#09090b" />
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  
  <!-- Outer Ring (Wave) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#neonGrad)" stroke-width="6" opacity="0.4" stroke-dasharray="15 10"/>
  
  <!-- Middle Ring (Wave) -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#neonGrad2)" stroke-width="8" opacity="0.7" filter="url(#shadowFilter)"/>
  
  <!-- Core Pulsing Button -->
  <circle cx="256" cy="256" r="50" fill="#09090b" stroke="url(#neonGrad)" stroke-width="12" filter="url(#shadowFilter)"/>
  <circle cx="256" cy="256" r="20" fill="url(#neonGrad2)"/>
</svg>
